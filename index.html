<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" id="theme-color" />
  <title>WSA Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Wallstreet Academy Notes</h1>
      <p class="subtitle">Live summary board for Cue's lessons</p>
    </div>
    <div class="filters">
      <input type="search" id="search" placeholder="Search lesson or tag" aria-label="Search" />
      <select id="statusFilter" aria-label="Status filter">
        <option value="all">All statuses</option>
        <option value="complete">Complete</option>
        <option value="in-progress">In progress</option>
      </select>
    </div>
  </header>

  <main>
    <section id="progressSection" class="progress-section" aria-label="Live progress">
      <div class="progress-head">
        <div>
          <p class="eyebrow">Live progress</p>
          <h2>Status board</h2>
        </div>
        <span class="muted" id="progressUpdated"></span>
      </div>
      <div id="progressFeed" class="progress-feed" aria-live="polite"></div>
    </section>
    <nav id="moduleFilters" class="module-nav" aria-label="Module filters"></nav>
    <section id="tagFilters" class="chip-row" aria-label="Tag filters"></section>
    <section id="cards" class="card-grid" aria-live="polite"></section>
  </main>

  <div class="note-viewer" id="noteViewer" aria-hidden="true">
    <div class="note-viewer__overlay" id="noteViewerOverlay" data-dismiss></div>
    <div
      class="note-viewer__panel"
      id="noteViewerPanel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="noteViewerTitle"
      tabindex="-1"
    >
      <header class="note-viewer__header">
        <div>
          <p class="note-viewer__eyebrow">Lesson notes</p>
          <h3 id="noteViewerTitle">Lesson</h3>
        </div>
        <button type="button" class="note-viewer__close" id="noteViewerClose" aria-label="Close notes viewer">
          <span aria-hidden="true">&times;</span>
        </button>
      </header>
      <div class="note-viewer__body" id="noteViewerBody">
        <div id="noteViewerLoading" class="note-viewer__loading" role="status">Fetching notes…</div>
        <div id="noteViewerError" class="note-viewer__error" role="alert" hidden></div>
        <article id="noteViewerContent" class="note-viewer__content"></article>
      </div>
    </div>
  </div>

  <template id="card-template">
    <article class="card">
      <div class="card-head">
        <div>
          <p class="eyebrow"></p>
          <h2></h2>
        </div>
        <span class="status"></span>
      </div>
      <p class="summary"></p>
      <div class="meta"></div>
      <div class="links"></div>
    </article>
  </template>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
